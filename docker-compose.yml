services:
  web:
    image: nginx:latest
    container_name: web-app
    volumes:
      - ./app:/usr/share/nginx/html:ro
    expose:
      - "80"

  proxy:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
